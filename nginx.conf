# ═══════════════════════════════════════════════════════════
#  WARZONE Nginx Reverse Proxy + Load Balancer
#
#  Routes:
#    /api/*         → API gateway (load balanced across replicas)
#    /socket.io/*   → API gateway (sticky sessions for WebSocket)
#    /*             → Web frontend (static Nginx)
# ═══════════════════════════════════════════════════════════

upstream api_servers {
    # Round-robin load balance across API replicas
    # 'api' resolves to both Docker replicas automatically
    server api:3000;

    # Keepalive connections to upstream (reduces TCP overhead)
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── WebSocket (Socket.IO) — must come BEFORE /api/ ───
    # ip_hash ensures same client always hits same upstream
    # (only needed as fallback if Redis adapter goes down)
    location /socket.io/ {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── REST API ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Enable HTTP keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeout for REST
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ── Static Uploads served by API ─────────────────────
    location /uploads/ {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Cache uploaded images for 1 day at the proxy
        proxy_cache_valid 200 1d;
    }

    # ── Frontend (SPA) ───────────────────────────────────
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
