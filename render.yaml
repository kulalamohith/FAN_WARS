services:
  - type: web
    name: fan-wars-api-v2
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: apps/api-gateway/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fan-wars-db-v2
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fan-wars-redis-v2
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: web
    name: fan-wars-web-v2
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://replace-this-after-deploy.onrender.com/api/v1

  - type: keyvalue
    name: fan-wars-redis-v2
    plan: free
    ipAllowList: []

databases:
  - name: fan-wars-db-v2
    plan: free
