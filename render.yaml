services:
  # ─── API Gateway Service ─────────────────────────────────
  - type: web
    name: fan-wars-api
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: apps/api-gateway/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fan-wars-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fan-wars-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLUSTER_WORKERS
        value: 1
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: FanWars HQ <noreply@fanwars.com>

  # ─── Web Frontend Service ───────────────────────────────
  - type: web
    name: fan-wars-web
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: apps/web/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://replace-this-after-deploy.onrender.com/api/v1
    dockerBuildArgs:
      - key: VITE_API_URL
        value: https://replace-this-after-deploy.onrender.com/api/v1

  # ─── Managed Redis Service ──────────────────────────────
  - type: redis
    name: fan-wars-redis
    plan: free
    ipAllowList: []

databases:
  - name: fan-wars-db
    plan: free
